# Memory request tune for 9dr5z headroom — helm upgrade argocd ... --reuse-values -f this file
controller:
  resources:
    requests:
      cpu: 250m
      memory: 192Mi
    limits:
      cpu: 1000m
      memory: 512Mi

repoServer:
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 384Mi

applicationSet:
  resources:
    requests:
      cpu: 50m
      memory: 48Mi
    limits:
      cpu: 200m
      memory: 128Mi
