# Resource-only overlay — use with: helm upgrade ... --reuse-values -f deploy/overlays/platform-resources-netdata.yaml
parent:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

child:
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 400m
      memory: 512Mi

k8sState:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
